<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link rel="stylesheet" href="add.css">
</head>
<body>
    <div class="glass-form">
        <h1>Add Student</h1>
        <form id="addStudentForm">
            <label for="first_name">Name</label>
            <input type="text" id="first_name" name="first_name" placeholder="Enter name" required>

            <label for="last_name">Class</label>
            <input type="text" id="last_name" name="last_name" placeholder="Enter class" required>

            <label for="email">Roll No</label>
            <input type="text" id="email" name="email" placeholder="Enter roll number" required>

            <label for="date_of_birth">Marks</label>
            <input type="number" id="date_of_birth" name="date_of_birth" placeholder="Enter marks">

            <button type="submit">Add Student</button>
        </form>
        <a href="index.html" class="back-link">Back to Home</a>
    </div>
    <script src="add_student.js"></script>
</body>
</html>
