<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Student Record Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="glass-container">
        <h1>My Profile</h1>
        <div class="profile-info">
            <p><strong>Username:</strong> <span id="profileUsername">JohnDoe</span></p>
            <p><strong>Email:</strong> <span id="profileEmail">johndoe@email.com</span></p>
            <p><strong>Role:</strong> <span id="profileRole">Student</span></p>
        </div>
        <button onclick="window.location.href='index.html'" class="back-btn">Back to Home</button>
        <button id="editProfileBtn" class="edit-btn" style="margin-top:15px;">Edit Profile</button>
        <button id="deleteAccountBtn" class="delete-btn" style="margin-top:15px;">Delete My Account</button>

        <!-- Edit Profile Modal -->
        <div id="editProfileModal" class="modal" style="display:none;">
            <div class="modal-content" id="editProfileModalContent">
                <span class="close" id="closeEditModal">&times;</span>
                <h2>Edit Profile</h2>
                <form id="editProfileForm">
                    <label for="editUsername">Username:</label>
                    <input type="text" id="editUsername" name="username" required><br>
                    <label for="editEmail">Email:</label>
                    <input type="email" id="editEmail" name="email" required><br>
                    <label for="editPassword">New Password:</label>
                    <input type="password" id="editPassword" name="password" placeholder="Leave blank to keep current"><br>
                    <button type="submit" class="save-btn">Save Changes</button>
                </form>
                <p id="editProfileMsg" style="color:red;"></p>
            </div>
        </div>
    </div>
    <script src="profile.js"></script>
</body>
</html>
