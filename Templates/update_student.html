<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student</title>
    <link rel="stylesheet" href="update.css">
</head>
<body>
    <div class="glass-container">
        <h1>Update Student Record</h1>
        <form class="glass-form" id="updateStudentForm">
            <label for="rollNo">Roll No:</label>
            <input type="text" id="rollNo" name="rollNo" placeholder="Enter Roll Number" required>
            
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter Name">
            
            <label for="class">Class:</label>
            <input type="text" id="class" name="class" placeholder="Enter Class">
            
            <label for="marks">Marks:</label>
            <input type="number" id="marks" name="marks" placeholder="Enter Marks">
            
            <button type="submit">Update Student</button>
        </form>
        <a href="index.html" class="back-link">Back to Home</a>
    </div>
    <script src="update_student.js"></script>
</body>
</html>
